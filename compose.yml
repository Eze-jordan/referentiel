services:
  db:
    image: mysql:8
    container_name: mysql_repository_db
    environment:
      MYSQL_ROOT_PASSWORD: 123456789
      MYSQL_DATABASE: repository_db
    ports:
      - "3310:3306"
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - referentiel_net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: referentiel_app
    depends_on:
      - db
    ports:
      - "9088:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/repository_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456789
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MySQL8Dialect

    networks:
      - referentiel_net

volumes:
  db-data:

networks:
  referentiel_net: