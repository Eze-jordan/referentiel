services:
  db:
    image: mysql:8
    container_name: mysql_referentiel_db
    environment:
      MYSQL_ROOT_PASSWORD: 123456789
      MYSQL_DATABASE: referentiel_db
    ports:
      - "3310:3306"
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - referentiel_net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: referentiel_app
    depends_on:
      - db
    ports:
      - "9088:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/Referentiel_db
    networks:
      - referentiel_net

volumes:
  db-data:

networks:
  referentiel_net: